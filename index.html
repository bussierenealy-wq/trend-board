<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendBoard Home | Intelligence for All</title>
    <!-- 引入洋气的 Google 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="google-style">
    <div class="app-layout">
        <!-- 悬浮式侧边导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="g-logo">
                    <span class="dot b"></span><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
                </div>
                <h1>TrendBoard</h1>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-group">
                    <span class="label">订阅源同步</span>
                    <div id="source-toggles" class="toggle-grid">
                        <!-- JS 注入 -->
                    </div>
                </div>
            </nav>

            <div class="sidebar-actions">
                <button id="sync-btn" class="fab-btn">
                    <span class="icon">✨</span>
                    <span class="text">立即刷新</span>
                </button>
                <div id="last-update" class="status-bar">就绪</div>
            </div>
        </aside>

        <!-- 主情报大厅 -->
        <main class="main-stage">
            <header class="stage-header">
                <div class="header-content">
                    <h2>实时洞察 <span class="badge">Live</span></h2>
                    <p>聚合全网实时趋势，辅助高净值决策</p>
                </div>
                <div class="display-adjust">
                    <button class="view-tab active" data-grid="3">标准</button>
                    <button class="view-tab" data-grid="4">宽屏</button>
                </div>
            </header>

            <div class="scroll-area">
                <div class="masonry-grid" id="trends-board">
                    <!-- 动态卡片 -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
